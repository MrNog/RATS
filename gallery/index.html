<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E🧀%3C/text%3E%3C/svg%3E" />
  <title>RATS — Gallery</title>

  <!-- shared -->
  <link rel="stylesheet" href="../assets/css/theme.css">
  <link rel="stylesheet" href="../assets/css/ui.css">
  <!-- page-specific -->
  <link rel="stylesheet" href="gallery.css">
</head>

<body>
  <div class="wrap wide">
    <div class="row">
      <a class="btn" href="../">← Back</a>
      <h1><svg class="hicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg> RATS — Gallery</h1>
    </div>
    <p class="sub">The guild's art &amp; lore — click any piece to view it full size and download. 🐀🧀</p>

    <div class="tabs" id="tabs"></div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- fullscreen lightbox -->
  <dialog id="lb">
    <div class="lb-count" id="lbCount"></div>
    <button class="lb-x" id="lbClose" title="Close (Esc)">✕</button>
    <button class="lb-nav prev" id="lbPrev" title="Previous (←)">‹</button>
    <button class="lb-nav next" id="lbNext" title="Next (→)">›</button>
    <div class="lb-stage" id="lbStage">
      <img id="lbImg" alt="" />
      <div class="lb-bar">
        <div class="lb-txt">
          <div class="t" id="lbTitle"></div>
          <div class="c" id="lbCap"></div>
        </div>
        <a class="lb-dl" id="lbDl" download>⬇ Download</a>
      </div>
    </div>
  </dialog>

  <script src="gallery.js"></script>
</body>

</html>
