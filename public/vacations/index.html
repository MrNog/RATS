<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E🧀%3C/text%3E%3C/svg%3E" />
  <title>RATS — Vacations</title>

  <!-- shared -->
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <link rel="stylesheet" href="../../assets/css/ui.css">
  <!-- page-specific -->
  <link rel="stylesheet" href="vacations.css">
</head>

<body>
  <div class="wrap">
    <div class="row">
      <a class="btn" id="backLink" href="../../index.html">← Back</a>
      <h1><svg class="hicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg> RATS — Vacations</h1>
      <a class="btn" id="attLink" href="../../officer/history/index.html" style="display:none;margin-left:auto">📊 Attendance →</a>
    </div>
    <p class="sub">Going away? Mark your dates so you're <b>not counted as a miss</b> on raid attendance. Pick your
      character, set the dates — single day? Fill <b>From</b> only.</p>

    <div class="card">
      <div class="form">
        <div style="position:relative;min-width:190px">
          <input type="text" id="vSearch" placeholder="Type your character…" autocomplete="off" oninput="acFilter()"
            onfocus="acFilter()" style="width:100%">
          <div id="vList" class="ac" style="display:none"></div>
        </div>
        <div class="segs" id="typeSegs" title="Vacation = playful away card. Personal = soft, low-key note (no dates/countdown)">
          <button type="button" class="seg active" data-t="vacation" onclick="setType(this)">🏖️ Vacation</button>
          <button type="button" class="seg" data-t="personal" onclick="setType(this)">💤 Personal</button>
        </div>
        <input type="date" id="vStart" lang="en-GB" title="From">
        <input type="date" id="vEnd" lang="en-GB" title="To (optional)">
        <input type="text" id="vNote" placeholder="note for officers (optional)" maxlength="120" style="flex:1;min-width:140px">
        <button onclick="addVac()">+ Add</button>
      </div>
      <div class="msg" id="msg"></div>
    </div>

    <div id="previewWrap" class="card" style="display:none;border-color:#3a4a5b">
      <div
        style="font-size:12px;color:#9ad0ff;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">
        👁 Live preview <span style="color:#6e7178;font-weight:600;text-transform:none;letter-spacing:0"> · how your away
          card will look</span>
      </div>
      <div id="devCard"></div>
    </div>

    <h2 class="sec" onclick="toggleSec('active')"><span class="caret" id="caretactive">▼</span> 🟢 Away now <span class="cnt" id="cntactive"></span></h2>
    <div id="activeWrap" class="seclist"><div id="active"></div></div>
    <h2 class="sec" onclick="toggleSec('all')"><span class="caret" id="caretall">▶</span> 📅 All vacations <span class="cnt" id="cntall"></span></h2>
    <div id="allWrap" class="seclist" style="display:none"><div id="all"></div></div>

    <!-- officers only: month calendar of who's away (revealed by vacations.js when the guild key is present) -->
    <div id="calSection" class="officer-only" style="display:none">
      <div class="calnav">
        <h2 style="margin:0">🗓️ Calendar</h2>
        <button class="del" onclick="calShift(-1)" style="border-color:#3a3d44;color:#9aa0a6">◀</button>
        <b id="calLabel" style="color:#fff;min-width:160px;text-align:center"></b>
        <button class="del" onclick="calShift(1)" style="border-color:#3a3d44;color:#9aa0a6">▶</button>
        <button class="del" onclick="calToday()" style="border-color:#3a3d44;color:#9aa0a6">Today</button>
      </div>
      <div id="calBox"></div>
    </div>
  </div>

  <script src="../../assets/js/data.js"></script>
  <script src="../../assets/js/datepicker.js"></script>
  <script src="vacations.js"></script>
</body>

</html>
