<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E🧀%3C/text%3E%3C/svg%3E" />
  <title>RATS — Gallery</title>
  <style>
    :root { --accent:#c0943a; --bg:#141517 }
    * { box-sizing:border-box }
    body { margin:0; background:var(--bg); color:#dcddde; font-family:"Segoe UI",Roboto,Arial,sans-serif; font-size:14px }
    .wrap { max-width:1100px; margin:0 auto; padding:18px }
    h1 { font-size:18px; margin:0; color:#fff; letter-spacing:.5px; display:inline-flex; align-items:center; gap:9px }
    h1 .hicon { width:23px; height:23px; flex:0 0 auto; color:var(--accent) }
    .sub { color:#8a8d93; font-size:13px; margin:8px 0 0 }
    .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap }
    a.btn { display:inline-flex; align-items:center; gap:6px; text-decoration:none; font-size:13px; font-weight:600;
      color:#9aa0a6; background:#202225; border:1px solid #2f3137; border-radius:6px; padding:6px 12px }
    a.btn:hover { border-color:var(--accent); color:#fff }

    /* category tabs */
    .tabs { display:flex; gap:8px; flex-wrap:wrap; margin:18px 0 4px }
    .tab { cursor:pointer; font-size:13px; font-weight:700; color:#9aa0a6; background:#202225;
      border:1px solid #2f3137; border-radius:20px; padding:6px 14px; transition:.15s }
    .tab:hover { border-color:var(--accent); color:#fff }
    .tab.active { background:var(--accent); color:#1b1d21; border-color:var(--accent) }

    /* JS masonry (cards absolutely positioned into the shortest column -> no gaps) */
    .grid { position:relative; margin-top:16px }
    .card { position:absolute; top:0; left:0; background:#1b1d21; border:1px solid #2f3137; border-radius:10px;
      overflow:hidden; cursor:zoom-in; transition:border-color .15s, transform .05s }
    .card:hover { border-color:var(--accent); transform:translateY(-1px); z-index:1 }
    .grid.empty-state { position:static }
    .card img { display:block; width:100%; height:auto; background:#0f1012 }
    .card .meta { padding:9px 11px }
    .card .t { color:#fff; font-weight:700; font-size:13px }
    .card .c { color:#9aa0a6; font-size:12px; margin-top:3px; line-height:1.4 }
    .empty { color:#8a8d93; text-align:center; margin:60px 0 }
    .empty .big { font-size:46px }

    /* fullscreen lightbox dialog */
    dialog#lb { padding:0; border:0; background:transparent; max-width:100vw; max-height:100vh; width:100%; height:100% }
    dialog#lb::backdrop { background:rgba(0,0,0,.86); backdrop-filter:blur(2px) }
    .lb-stage { position:fixed; inset:0; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:56px 18px 18px; cursor:zoom-out }
    .lb-stage img { max-width:94vw; max-height:78vh; width:auto; height:auto; border-radius:8px; box-shadow:0 12px 50px rgba(0,0,0,.6) }
    .lb-bar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:14px; max-width:94vw }
    .lb-txt { text-align:center }
    .lb-txt .t { color:#fff; font-weight:800; font-size:15px }
    .lb-txt .c { color:#9aa0a6; font-size:12.5px; margin-top:2px }
    .lb-dl { display:inline-flex; align-items:center; gap:5px; text-decoration:none; font-size:11.5px; font-weight:800;
      background:var(--accent); color:#1b1d21; border:1px solid var(--accent); border-radius:7px; padding:5px 11px }
    .lb-dl:hover { filter:brightness(1.1) }
    .lb-stage img, .lb-bar { cursor:default }
    .lb-x, .lb-nav { position:fixed; z-index:2; cursor:pointer; color:#dcddde; background:rgba(32,34,37,.7);
      border:1px solid #2f3137; border-radius:8px; font-size:18px; font-weight:700; line-height:1; user-select:none }
    .lb-x { top:14px; right:16px; padding:8px 12px }
    .lb-nav { top:50%; transform:translateY(-50%); padding:14px 16px; font-size:22px }
    .lb-nav.prev { left:14px } .lb-nav.next { right:14px }
    .lb-x:hover, .lb-nav:hover { border-color:var(--accent); color:#fff }
    .lb-count { position:fixed; z-index:2; top:18px; left:16px; color:#9aa0a6; font-size:12px; font-weight:700 }
    /* global-gold-scroll */ html{scrollbar-width:thin;scrollbar-color:#c0943a #16181c} ::-webkit-scrollbar{width:11px;height:11px} ::-webkit-scrollbar-track{background:#16181c} ::-webkit-scrollbar-thumb{background:#c0943a;border-radius:8px;border:2px solid #16181c} ::-webkit-scrollbar-thumb:hover{background:#e0b860}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="row">
      <a class="btn" href="index.html">← Back</a>
      <h1><svg class="hicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg> RATS — Gallery</h1>
    </div>
    <p class="sub">The guild's art &amp; lore — click any piece to view it full size and download. 🐀🧀</p>

    <div class="tabs" id="tabs"></div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- fullscreen lightbox -->
  <dialog id="lb">
    <div class="lb-count" id="lbCount"></div>
    <button class="lb-x" id="lbClose" title="Close (Esc)">✕</button>
    <button class="lb-nav prev" id="lbPrev" title="Previous (←)">‹</button>
    <button class="lb-nav next" id="lbNext" title="Next (→)">›</button>
    <div class="lb-stage" id="lbStage">
      <img id="lbImg" alt="" />
      <div class="lb-bar">
        <div class="lb-txt">
          <div class="t" id="lbTitle"></div>
          <div class="c" id="lbCap"></div>
        </div>
        <a class="lb-dl" id="lbDl" download>⬇ Download</a>
      </div>
    </div>
  </dialog>

  <script>
    const CATS = [
      { id: "all",            label: "All" },
      { id: "classes",        label: "Classes" },
      { id: "commissions",    label: "Commissions" },
      { id: "lore",           label: "Lore" },
      { id: "warchief-fangs", label: "Fangs" },
      { id: "warchiefs",      label: "Warchiefs" },
      { id: "banners",        label: "Banners" },
      { id: "wallpaper",      label: "Wallpapers" },
      { id: "icons",          label: "Icons" }
    ];

    const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    const enc = s => encodeURI(String(s == null ? "" : s)); // URL-safe path (handles spaces in filenames)
    const grid = document.getElementById("grid");
    const tabsEl = document.getElementById("tabs");
    let ITEMS = [], view = [], filter = "all", cur = 0;

    // --- tabs ---
    tabsEl.innerHTML = CATS.map(c => `<div class="tab${c.id === "all" ? " active" : ""}" data-cat="${c.id}">${esc(c.label)}</div>`).join("");
    tabsEl.addEventListener("click", e => {
      const t = e.target.closest(".tab"); if (!t) return;
      filter = t.dataset.cat;
      [...tabsEl.children].forEach(x => x.classList.toggle("active", x === t));
      render();
    });

    const GAP = 14, MINCOL = 220;

    function render() {
      view = filter === "all" ? ITEMS : ITEMS.filter(i => i.cat === filter);
      if (!view.length) {
        grid.classList.add("empty-state");
        grid.style.height = "";
        grid.innerHTML = `<div class="empty"><div class="big">🖼🐀</div><p>Nothing here yet — art coming soon.</p></div>`;
        return;
      }
      grid.classList.remove("empty-state");
      grid.innerHTML = view.map((it, i) => `<div class="card${it.wide ? " wide" : ""}" data-i="${i}">
        <img src="${esc(enc(it.file))}" alt="${esc(it.title)}"
             onerror="this.closest('.card').style.display='none';window.__relayout&&window.__relayout()" />
        <div class="meta">
          <div class="t">${esc(it.title || "")}</div>
          ${it.caption ? `<div class="c">${esc(it.caption)}</div>` : ""}
        </div>
      </div>`).join("");
      // re-layout as each image learns its size, then settle
      grid.querySelectorAll("img").forEach(img => {
        if (!img.complete) img.addEventListener("load", layout, { once: true });
      });
      layout();
    }

    function layout() {
      const cards = [...grid.querySelectorAll(".card")].filter(c => c.style.display !== "none");
      if (!cards.length) return;
      const W = grid.clientWidth;
      const cols = Math.max(1, Math.floor((W + GAP) / (MINCOL + GAP)));
      const colW = (W - GAP * (cols - 1)) / cols;
      const heights = new Array(cols).fill(0);
      for (const card of cards) {
        if (card.classList.contains("wide")) {           // full-row banner
          const top = Math.max(...heights);
          card.style.left = "0px"; card.style.top = top + "px"; card.style.width = W + "px";
          const h = card.offsetHeight;
          heights.fill(top + h + GAP);
        } else {
          card.style.width = colW + "px";
          let c = 0; for (let k = 1; k < cols; k++) if (heights[k] < heights[c]) c = k; // shortest column
          card.style.left = c * (colW + GAP) + "px";
          card.style.top = heights[c] + "px";
          heights[c] += card.offsetHeight + GAP;
        }
      }
      grid.style.height = (Math.max(...heights) - GAP) + "px";
    }

    window.__relayout = layout;
    let rt; addEventListener("resize", () => { clearTimeout(rt); rt = setTimeout(layout, 120); });

    grid.addEventListener("click", e => {
      const card = e.target.closest(".card"); if (!card) return;
      open(+card.dataset.i);
    });

    // --- lightbox ---
    const lb = document.getElementById("lb");
    const lbImg = document.getElementById("lbImg"), lbTitle = document.getElementById("lbTitle"),
      lbCap = document.getElementById("lbCap"), lbDl = document.getElementById("lbDl"),
      lbCount = document.getElementById("lbCount");

    function open(i) {
      cur = i; const it = view[cur]; if (!it) return;
      lbImg.src = enc(it.file); lbImg.alt = it.title || "";
      lbTitle.textContent = it.title || "";
      lbCap.textContent = it.caption || "";
      lbDl.href = enc(it.file);
      lbDl.setAttribute("download", (it.file.split("/").pop()) || "rats-art");
      lbCount.textContent = `${cur + 1} / ${view.length}`;
      if (!lb.open) lb.showModal();
    }
    const step = d => open((cur + d + view.length) % view.length);

    document.getElementById("lbClose").onclick = () => lb.close();
    document.getElementById("lbPrev").onclick = () => step(-1);
    document.getElementById("lbNext").onclick = () => step(1);
    lb.addEventListener("click", e => { if (e.target === lb) lb.close(); }); // ::backdrop click
    document.getElementById("lbStage").addEventListener("click", e => { if (e.target.id === "lbStage") lb.close(); }); // click empty area
    document.addEventListener("keydown", e => {
      if (!lb.open) return;
      if (e.key === "ArrowLeft") step(-1);
      else if (e.key === "ArrowRight") step(1);
    });

    // --- load manifest ---
    fetch("gallery.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : [])
      .then(d => { ITEMS = Array.isArray(d) ? d : []; render(); })
      .catch(() => { ITEMS = []; render(); });
  </script>
</body>

</html>
