name: Build gallery.json

# Regenerate gallery.json whenever images are added/removed/renamed.
on:
  push:
    paths:
      - "images/**"
      - "scripts/build-gallery.ps1"
      - ".github/workflows/build-gallery.yml"
  workflow_dispatch: {}   # allow running it manually from the Actions tab

permissions:
  contents: write          # needed to commit the regenerated manifest back

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild manifest
        shell: pwsh                       # pwsh is preinstalled on the runner
        run: ./scripts/build-gallery.ps1

      - name: Commit gallery.json if it changed
        run: |
          if [[ -n "$(git status --porcelain gallery.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add gallery.json
            git commit -m "chore: rebuild gallery.json [skip ci]"
            git push
            echo "gallery.json updated."
          else
            echo "gallery.json already up to date."
          fi
