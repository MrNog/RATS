name: Addon update notifier

# Posts to the #okanor-logs Discord channel when an EXTERNAL mandatory addon updates.
# These repos aren't ours and mostly don't cut "releases" — they just push commits — so we watch
# the latest RELEASE if there is one, otherwise the latest COMMIT on the default branch.
# Edit the watched list in releases.json (external mandatory addons only).
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min
  workflow_dispatch: {}        # run manually from the Actions tab

permissions:
  contents: write              # to store the "last seen" version

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check external addons for updates
        env:
          WEBHOOK: ${{ secrets.LOG_WEBHOOK }}       # = the "Logs" webhook URL (Admin → Discord webhooks → Logs)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Fail loudly if the webhook secret is missing — check once up front
          if [ -z "$WEBHOOK" ]; then
            echo "::warning::LOG_WEBHOOK secret is not set — Discord notifications will be skipped. Add it in GitHub Settings → Secrets and variables → Actions."
          fi
          [ -f release-state.json ] || echo '{}' > release-state.json
          hub=$(jq -r '.hubUrl // ""' releases.json)
          n=$(jq '.addons | length' releases.json)
          api() { curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$1"; }
          changed=0
          for i in $(seq 0 $((n - 1))); do
            name=$(jq -r ".addons[$i].name" releases.json)
            repo=$(jq -r ".addons[$i].repo" releases.json)

            # 1) prefer a real release tag; 2) else the latest commit on the default branch
            ver=$(api "https://api.github.com/repos/$repo/releases/latest" | jq -r '.tag_name // empty')
            kind="release"
            if [ -z "$ver" ]; then
              branch=$(jq -r ".addons[$i].branch // empty" releases.json)
              [ -z "$branch" ] && branch=$(api "https://api.github.com/repos/$repo" | jq -r '.default_branch // "master"')
              ver=$(api "https://api.github.com/repos/$repo/commits/$branch" | jq -r '.sha // empty' | cut -c1-7)
              kind="commit"
            fi
            [ -z "$ver" ] && { echo "no version for $repo"; continue; }

            last=$(jq -r --arg r "$repo" '.[$r] // empty' release-state.json)
            if [ "$ver" != "$last" ]; then
              # only announce when we had a previous value (first run just seeds state, no spam)
              if [ -n "$last" ]; then
                echo "Update detected: $name $last → $ver ($kind)"
                if [ -n "$WEBHOOK" ]; then
                  title="📦 $name — new update"
                  desc="New $kind \`$ver\` is out for **$name**.
          🔗 [Open the RATS hub →]($hub)"
                  payload=$(jq -n --arg t "$title" --arg u "$hub" --arg d "$desc" --arg f "$repo" \
                    '{embeds:[{author:{name:"RATS • Addon updates"},title:$t,url:$u,description:$d,color:12686394,footer:{text:$f}}]}')
                  http_code=$(curl -s -o /dev/null -w "%{http_code}" -H "Content-Type: application/json" -d "$payload" "$WEBHOOK")
                  if [ "$http_code" = "204" ] || [ "$http_code" = "200" ]; then
                    echo "✅ Announced $name $ver to Discord (HTTP $http_code)"
                  else
                    echo "::error::Discord webhook failed for $name (HTTP $http_code) — check LOG_WEBHOOK secret"
                  fi
                else
                  echo "::warning::Skipped Discord post for $name $ver — LOG_WEBHOOK not set"
                fi
              else
                echo "Seeded $name $ver (first run — no Discord post)"
              fi
              tmp=$(jq --arg r "$repo" --arg v "$ver" '.[$r]=$v' release-state.json)
              echo "$tmp" > release-state.json
              changed=1
            fi
          done
          if [ "$changed" = "1" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add release-state.json
            git commit -m "chore: update addon version state [skip ci]"
            git push
          fi
