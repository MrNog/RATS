name: Addon release notifier

# Posts to Discord when an addon you follow cuts a new release — you do NOT need to own those repos
# (the GitHub releases API is public). Edit the watched list in releases.json.
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min
  workflow_dispatch: {}        # run manually from the Actions tab

permissions:
  contents: write              # to store the "last seen" tags

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new releases
        env:
          WEBHOOK: ${{ secrets.RELEASE_WEBHOOK }}   # add this secret = your Discord webhook URL
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          [ -f release-state.json ] || echo '{}' > release-state.json
          hub=$(jq -r '.hubUrl // ""' releases.json)
          n=$(jq '.addons | length' releases.json)
          changed=0
          for i in $(seq 0 $((n - 1))); do
            name=$(jq -r ".addons[$i].name" releases.json)
            repo=$(jq -r ".addons[$i].repo" releases.json)
            tag=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/$repo/releases/latest" | jq -r '.tag_name // empty')
            [ -z "$tag" ] && continue
            last=$(jq -r --arg r "$repo" '.[$r] // empty' release-state.json)
            if [ "$tag" != "$last" ]; then
              # only announce when we had a previous tag (first run just seeds state, no spam)
              if [ -n "$last" ] && [ -n "$WEBHOOK" ]; then
                payload=$(jq -n --arg t "📦 $name — new update $tag" --arg u "$hub" \
                  --arg d "A new version is out. Grab the latest from the RATS hub. ⬇" \
                  '{embeds:[{title:$t,url:$u,description:$d,color:12686394,footer:{text:"FOR THE RATS 🧀"}}]}')
                curl -s -H "Content-Type: application/json" -d "$payload" "$WEBHOOK" >/dev/null || true
                echo "Announced $name $tag"
              else
                echo "Seeded $name $tag"
              fi
              tmp=$(jq --arg r "$repo" --arg t "$tag" '.[$r]=$t' release-state.json)
              echo "$tmp" > release-state.json
              changed=1
            fi
          done
          if [ "$changed" = "1" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add release-state.json
            git commit -m "chore: update addon release state [skip ci]"
            git push
          fi
